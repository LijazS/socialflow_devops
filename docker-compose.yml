version: "3.9"

services:
  # ─── Auth / User Service ──────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: socialflow-auth
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: mysql+pymysql://admin:asdfghjk@socialflow-db.clway4wimmdv.ap-south-1.rds.amazonaws.com:3306/auth_db
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}

  # ─── Post Service ─────────────────────────────────────────────────────────────
  post-service:
    build:
      context: ./post-service
      dockerfile: Dockerfile
    container_name: socialflow-post
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: mysql+pymysql://admin:asdfghjk@socialflow-db.clway4wimmdv.ap-south-1.rds.amazonaws.com:3306/post_db
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - post_uploads:/app/uploads

  # ─── Feed Service ─────────────────────────────────────────────────────────────
  feed-service:
    build:
      context: ./feed-service
      dockerfile: Dockerfile
    container_name: socialflow-feed
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      AUTH_DATABASE_URL: mysql+pymysql://admin:asdfghjk@socialflow-db.clway4wimmdv.ap-south-1.rds.amazonaws.com:3306/auth_db
      POST_DATABASE_URL: mysql+pymysql://admin:asdfghjk@socialflow-db.clway4wimmdv.ap-south-1.rds.amazonaws.com:3306/post_db
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - auth-service
      - post-service

  # ─── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: socialflow-notification
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: mysql+pymysql://admin:asdfghjk@socialflow-db.clway4wimmdv.ap-south-1.rds.amazonaws.com:3306/notification_db
      JWT_SECRET: ${JWT_SECRET}

  # ─── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_URL: ${VITE_AUTH_URL:-http://13.127.251.134:8001}
        VITE_POST_URL: ${VITE_POST_URL:-http://13.127.251.134:8002}
        VITE_FEED_URL: ${VITE_FEED_URL:-http://13.127.251.134:8003}
        VITE_NOTIF_URL: ${VITE_NOTIF_URL:-http://13.127.251.134:8004}
        VITE_NOTIF_WS_URL: ${VITE_NOTIF_WS_URL:-ws://13.127.251.134:8004}
    container_name: socialflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - post-service
      - feed-service
      - notification-service

volumes:
  post_uploads:
